<style>
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-bottom: 30px; }
    .menu-card { background: #fff; border: 1px solid #dee2e6; border-radius: 12px; padding: 15px 10px; text-align: center; text-decoration: none; color: #333; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.2s; }
    .menu-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); border-color: #007bff; }
    .menu-card h3 { font-size: 1rem; margin: 0 0 5px 0; color: #007bff; }
    .menu-card p { font-size: 0.75rem; color: #6c757d; margin: 0; line-height: 1.2; }
    
    .dashboard-layout { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
    .hero-panel { flex: 1; min-width: 240px; text-align: center; padding: 20px 0; background: #fff; border-radius: 12px; border: 1px solid #dee2e6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    .log-panel { flex: 1; min-width: 240px; align-self: stretch; background: #fff; border-radius: 12px; border: 1px solid #dee2e6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); display: flex; flex-direction: column; }
    
    @media (max-width: 600px) {
        .dashboard-layout { flex-direction: column; }
        .hero-panel, .log-panel { width: 100%; }
    }
    
    .log-entry { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; font-size: 0.8rem; font-family: monospace; }
    .log-time { color: #666; }
    .log-status-ok { color: #003399; font-weight: bold; }
    .log-status-fail { color: #dc3545; font-weight: bold; }
</style>

<div class="container">
    <h2 style="margin-bottom: 20px; color: #333;">Панель управления</h2>

    <div class="dashboard-layout">
        <div class="hero-panel">
            <svg width="220" height="350" viewBox="0 0 220 350" xmlns="http://www.w3.org/2000/svg" style="max-width: 100%; height: auto;">
                <rect x="0" y="130" width="220" height="220" fill="#c2a683" stroke="#8b6b4a" stroke-width="2"/>
                <rect x="10" y="10" width="200" height="50" rx="6" fill="#e9f5ff" stroke="#b8daff" stroke-width="2"/>
                <text x="110" y="40" font-family="Arial" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">Воздух: <tspan id="val-air" fill="#007bff">--.-°C | --%</tspan></text>
                <rect x="80" y="60" width="60" height="270" rx="5" fill="#e0e0e0" stroke="#a0a0a0" stroke-width="2"/>
                <line x1="0" y1="130" x2="220" y2="130" stroke="#555" stroke-width="2" stroke-dasharray="4 2"/>
                <text x="10" y="120" font-family="Arial" font-size="12" fill="#555">Уровень земли</text>

                <circle cx="110" cy="130" r="4" fill="#007bff"/>
                <line x1="110" y1="130" x2="160" y2="130" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="165" y="125" font-family="Arial" font-size="12" fill="#333">0мм:</text><text id="val-0" x="165" y="145" font-family="Arial" font-size="14" fill="#003399" font-weight="bold">--.-</text>

                <circle cx="110" cy="160" r="4" fill="#007bff"/>
                <line x1="60" y1="160" x2="110" y2="160" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="55" y="155" font-family="Arial" font-size="12" fill="#333" text-anchor="end">-50мм:</text><text id="val-m50" x="55" y="170" font-family="Arial" font-size="14" fill="#003399" font-weight="bold" text-anchor="end">--.-</text>

                <circle cx="110" cy="190" r="4" fill="#007bff"/>
                <line x1="110" y1="190" x2="160" y2="190" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="165" y="185" font-family="Arial" font-size="12" fill="#333">-100мм:</text><text id="val-m100" x="165" y="200" font-family="Arial" font-size="14" fill="#003399" font-weight="bold">--.-</text>

                <circle cx="110" cy="230" r="4" fill="#007bff"/>
                <line x1="60" y1="230" x2="110" y2="230" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="55" y="225" font-family="Arial" font-size="12" fill="#333" text-anchor="end">-200мм:</text><text id="val-m200" x="55" y="240" font-family="Arial" font-size="14" fill="#003399" font-weight="bold" text-anchor="end">--.-</text>

                <circle cx="110" cy="280" r="4" fill="#007bff"/>
                <line x1="110" y1="280" x2="160" y2="280" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="165" y="275" font-family="Arial" font-size="12" fill="#333">-400мм:</text><text id="val-m400" x="165" y="290" font-family="Arial" font-size="14" fill="#003399" font-weight="bold">--.-</text>

                <circle cx="110" cy="320" r="4" fill="#007bff"/>
                <line x1="60" y1="320" x2="110" y2="320" stroke="#777" stroke-width="1" stroke-dasharray="2 2"/>
                <text x="55" y="315" font-family="Arial" font-size="12" fill="#333" text-anchor="end">-800мм:</text><text id="val-m800" x="55" y="330" font-family="Arial" font-size="14" fill="#003399" font-weight="bold" text-anchor="end">--.-</text>
            </svg>
            <div style="margin-top: 15px; font-size: 0.85rem; color: #666; background: #f8f9fa; display: inline-block; padding: 6px 15px; border-radius: 20px; border: 1px solid #eee;">
                📡 <span id="val-role">...</span> | ⚡ <span id="val-bat">-- В</span><br>
                <b id="val-id-display" style="color: #007bff; font-size: 0.9rem;">ID: ----</b> | <span id="val-mode-display" style="font-weight: bold;">---</span>
            </div>
        </div>

        <div class="log-panel">
            <div style="font-size: 0.9rem; font-weight: bold; padding: 10px; border-bottom: 1px solid #eee;">Журнал пакетов</div>
            <div id="packet-log" style="flex: 1; overflow-y: auto; max-height: 330px;">
                <div style="color: #999; text-align: center; padding-top: 20px; font-size: 0.8rem;">Ожидание...</div>
            </div>
        </div>
    </div>

    <div class="menu-grid">
        <a href="#" id="tile-sensor" class="menu-card">
            <span style="font-size: 40px; margin-bottom: 10px;">🌡️</span>
            <h3 id="tile-sensor-title">Датчики</h3>
            <p id="tile-sensor-desc">Загрузка...</p>
        </a>
        <a href="hardware" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">🎛️</span><h3>GPIO Пины</h3><p>Управление портами</p></a>
        <a href="files" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">📁</span><h3>Файлы</h3><p>Редактор кода</p></a>
        <a href="network" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">🌐</span><h3>Сеть</h3><p>Настройки Wi-Fi</p></a>
        <a href="cron" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">⏱️</span><h3>Cron</h3><p>Планировщик задач</p></a>
        <a href="update" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">🚀</span><h3>Обновление</h3><p>Синхронизация файлов</p></a>
        <a href="system" class="menu-card"><span style="font-size: 40px; margin-bottom: 10px;">⚙️</span><h3>Система</h3><p>Информация о чипе</p></a>
    </div>
</div>

<script>
async function updateDashboard() {
    try {
        const response = await fetch('/api/data', {method: 'POST', body: JSON.stringify(['uptime'])});
        const data = await response.json();

        const isTX = data.role === 'tx';
        document.getElementById('val-role').textContent = isTX ? 'Передатчик' : 'Приемник';
        document.getElementById('tile-sensor-title').textContent = isTX ? 'Сенсоры' : 'Мониторинг';
        document.getElementById('tile-sensor-desc').textContent = isTX ? 'Локальные датчики' : 'Данные из эфира';
        document.getElementById('tile-sensor').href = isTX ? 'gts_tx' : 'gts_rx';

        // Отображение локального ID и режима
        if (data.device_id !== undefined) {
            document.getElementById('val-id-display').textContent = 'ID: ' + data.device_id.toString(16).toUpperCase();
        }
        
        if (data.sensors) {
            if (data.sensors.bat !== undefined) {
                document.getElementById('val-bat').textContent = data.sensors.bat.toFixed(2) + ' В';
            }
            
            if (data.sensors.mode !== undefined || isTX) {
                const mode = data.sensors.mode;
                const modeEl = document.getElementById('val-mode-display');
                if (isTX) {
                    modeEl.style.display = 'inline';
                    modeEl.textContent = "Active OS"; modeEl.style.color = "#28a745";
                } else {
                    modeEl.style.display = 'none';
                }
            }

            if (data.sensors.soil) {
                const airT = data.sensors.air_t !== undefined ? data.sensors.air_t.toFixed(1) : '--.-';
                const airH = data.sensors.air_h !== undefined ? data.sensors.air_h : '--';
                document.getElementById('val-air').textContent = `${airT}°C | ${airH}%`;

                const soil = data.sensors.soil;
                const ids = ['val-0', 'val-m50', 'val-m100', 'val-m200', 'val-m400', 'val-m800'];
                ids.forEach((id, index) => {
                    const el = document.getElementById(id);
                    if (el && soil[index] !== undefined) {
                        el.textContent = soil[index].toFixed(1);
                        el.style.fill = soil[index] > -50 ? '#003399' : '#007bff';
                    }
                });
            }
        }

        const logContainer = document.getElementById('packet-log');
        if (data.packet_log && data.packet_log.length > 0) {
            logContainer.innerHTML = data.packet_log.map(p => {
                let hexId = '----';
                try { hexId = (p.device_id || 0).toString(16).toUpperCase(); } catch(e) {}
                
                const modeStr = p.mode === 1 ? "Deep Sleep" : "Active OS";
                const modeColor = p.mode === 1 ? "#6f42c1" : "#28a745";
                const statusStr = isTX ? `${(p.air_t || 0).toFixed(1)}°C | ${p.air_h || 0}%` : `RSSI: ${p.rssi || 0} dBm`;
                const statusClass = (p.status === 'OK' || !isTX) ? 'log-status-ok' : 'log-status-fail';
                const dateStr = p.date || '';
                const timeStr = p.time || '--:--:--';
                const batStr = (p.bat || 0).toFixed(2);
                
                return `
                <div class="log-entry" style="flex-direction: column; align-items: flex-start; height: auto; padding: 8px 10px;">
                    <div style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 3px;">
                        <span class="log-time" style="font-weight: bold;">${dateStr} ${timeStr}</span>
                        <span class="${statusClass}">${statusStr}</span>
                    </div>
                    <div style="width: 100%; display: flex; justify-content: space-between; font-size: 0.75rem;">
                        <span>ID: <b style="color:#007bff">${hexId}</b> | <span style="color:${modeColor}; font-weight:bold;">${modeStr}</span></span>
                        <span style="color: #ffc107; font-weight: bold;">${batStr}В</span>
                    </div>
                </div>`;
            }).join('');
        } else {
            logContainer.innerHTML = '<div style="color: #999; text-align: center; padding-top: 20px; font-size: 0.8rem;">Журнал пуст</div>';
        }
    } catch (e) { console.error("Ошибка API:", e); }
}
setInterval(updateDashboard, 5000);
updateDashboard();
</script>
