<style>
    .sensor-card { background:#fff; border:1px solid #dee2e6; border-radius:12px; padding:20px; margin-bottom:20px; box-shadow:0 4px 6px rgba(0,0,0,0.05); }
    .sensor-title { font-size:1.2rem; font-weight:bold; color:#007bff; margin-bottom:15px; border-bottom:2px solid #f8f9fa; padding-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
    .data-val { font-size:1.8rem; font-weight:bold; color:#28a745; }
    .ow-item { border:1px solid #eee; padding:10px; margin-bottom:10px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; background:#fafafa; }
    .btn-action { width:100%; padding:12px; border:none; border-radius:8px; font-size:1rem; font-weight:bold; cursor:pointer; margin-top:10px; color:#fff; }
</style>

<div class="container">
    <div class="dashboard-header" style="font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; color: #333;">
        Приемник (GTS RX) ID: <span id="local-id" style="color: #007bff;">Загрузка...</span>
    </div>
    
    <div class="sensor-card" style="border-color: #28a745; margin-bottom: 20px;">
        <div class="sensor-title" style="color: #28a745;">Собственная батарея приемника</div>
        <div id="local-bat-val" style="font-size:1.5rem; font-weight:bold; color:#28a745;">Ожидание...</div>
    </div>

    <div class="sensor-card" style="border-color: #6f42c1;">
        <div class="sensor-title" style="color: #6f42c1;">
            <span>Настройки приемника</span>
            <span id="rx-status-badge" style="font-size:0.8rem; background:#eee; padding:3px 8px; border-radius:12px; color:#666;">Загрузка...</span>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button onclick="controlRx('start')" class="btn-action" style="background:#28a745; margin-top:0;">▶ Запустить прием</button>
            <button onclick="controlRx('stop')" class="btn-action" style="background:#dc3545; margin-top:0;">⏹ Остановить</button>
        </div>

        <div style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #dee2e6;">
            <label style="display:flex; align-items:center; cursor:pointer; margin-bottom: 15px;">
                <input type="checkbox" id="cb-autostart" style="width:20px; height:20px; margin-right:10px;">
                <b style="color: #333;">Автозапуск приемника при включении контроллера</b>
            </label>

            <label style="display:block; margin-bottom:5px; font-weight:bold; color: #555;">IP-адрес Syslog сервера (оставьте пустым для отключения):</label>
            <input type="text" id="inp-syslog" placeholder="192.168.1.100" style="width:100%; height:40px; margin-bottom:10px; padding:10px; border-radius:6px; border:1px solid #ddd; box-sizing:border-box;">

            <button onclick="saveSettings()" class="btn-action" style="background:#007bff; margin-top:0; padding:8px;">💾 Сохранить настройки</button>
            <p id="save-status" style="margin-top: 5px; color: #28a745; font-size: 0.9rem; display: none;">Настройки сохранены!</p>
        </div>
    </div>

    <div class="sensor-card">
        <div class="sensor-title">
            <span>Последние данные (Воздух & Батарея)</span>
            <span id="pack-time" style="font-size:0.9rem; color:#888;">---</span>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div id="dht-val" class="data-val">Ожидание...</div>
            <div id="bat-val" style="font-size:1.2rem; font-weight:bold; color:#ffc107;"></div>
        </div>
        <p style="margin-top:5px; color:#666; font-size:0.9rem;">Уровень сигнала (RSSI): <span id="rssi-val">---</span> dBm</p>
    </div>

    <div class="sensor-card">
        <div class="sensor-title">Почва (Глубинные датчики)</div>
        <div id="ow-list">
            <p style="color: #6c757d;">Пакеты пока не получены...</p>
        </div>
    </div>
</div>

<script>
    let isEditing = false;

    // Блокируем обновление инпутов, если пользователь кликнул в них
    document.getElementById('inp-syslog').addEventListener('focus', () => isEditing = true);
    document.getElementById('inp-syslog').addEventListener('blur', () => isEditing = false);
    document.getElementById('cb-autostart').addEventListener('focus', () => isEditing = true);
    document.getElementById('cb-autostart').addEventListener('blur', () => isEditing = false);

    async function update() {
        try {
            const res = await fetch('/api/gts_rx/data');
            const data = await res.json();
            
            document.getElementById('local-id').textContent = data.device_id || '---';
            if (data.local_bat > 0) {
                document.getElementById('local-bat-val').textContent = `⚡ ${data.local_bat.toFixed(2)} В`;
            }

            const badge = document.getElementById('rx-status-badge');
            if(data.active) {
                badge.textContent = "АКТИВЕН (Слушает)";
                badge.style.background = "#28a745"; badge.style.color = "#fff";
            } else {
                badge.textContent = "ОСТАНОВЛЕН";
                badge.style.background = "#eee"; badge.style.color = "#666";
            }

            if (!isEditing) {
                document.getElementById('cb-autostart').checked = data.autostart;
                document.getElementById('inp-syslog').value = data.syslog_ip;
            }

            const pack = data.last_packet;
            if(pack.status === "ok") {
                document.getElementById('pack-time').textContent = pack.time;
                document.getElementById('rssi-val').textContent = pack.rssi;
                document.getElementById('dht-val').innerHTML = `
                    <div style="font-size: 1.2rem; color: #555;">ID отправителя: <b style="color: #007bff;">${pack.data.device_id}</b></div>
                    <div>${pack.data.air_t}°C | ${pack.data.air_h}%</div>
                    <div style="font-size: 1rem; color: #ffc107;">Батарея отправителя: ${pack.data.bat.toFixed(2)} В</div>
                `;
                document.getElementById('bat-val').style.display = 'none';

                const list = document.getElementById('ow-list');
                let owHtml = "";
                pack.data.soil.forEach((temp, i) => {
                    if (temp > 0) {
                        owHtml += `
                        <div class="ow-item">
                            <span><b style="color:#333;">Датчик #${i+1}</b></span>
                            <span style="font-size:1.2rem; font-weight:bold; color:#007bff;">${temp}°C</span>
                        </div>`;
                    }
                });
                list.innerHTML = owHtml || '<p style="color:#666;">Нет данных о почве</p>';
            }
        } catch (e) {}
    }

    async function controlRx(action) {
        await fetch('/api/gts_rx/control', { method: 'POST', body: JSON.stringify({action: action}) });
        update();
    }

    async function saveSettings() {
        const autostart = document.getElementById('cb-autostart').checked;
        const ip = document.getElementById('inp-syslog').value;

        await fetch('/api/gts_rx/control', {
            method: 'POST',
            body: JSON.stringify({action: "save_settings", autostart: autostart, syslog_ip: ip})
        });

        isEditing = false;

        const statusText = document.getElementById('save-status');
        statusText.style.display = 'block';
        setTimeout(() => statusText.style.display = 'none', 3000);
        update();
    }

    update();
    setInterval(update, 3000);
</script>
